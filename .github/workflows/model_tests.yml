name: Segmentation Model Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Job 1: Validate ONNX models ─────────────────────────────────────────────
  onnx-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install onnxruntime huggingface_hub numpy

      - name: Validate ONNX models from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import onnxruntime as ort
          import numpy as np
          from huggingface_hub import hf_hub_download, list_repo_files
          from huggingface_hub.utils import EntryNotFoundError, RepositoryNotFoundError
          import os

          token = os.environ.get('HF_TOKEN')
          REPO  = 'animeshakr/oct-fluid-segmentation'

          # Check if ONNX files have been uploaded yet
          try:
              repo_files = list(list_repo_files(repo_id=REPO, token=token))
          except RepositoryNotFoundError:
              print('SKIP: HF repo not found — weights not yet uploaded.')
              exit(0)

          onnx_file = 'deployment/slot1_v2l_seed2024.onnx'
          if onnx_file not in repo_files:
              print(f'SKIP: {onnx_file} not yet uploaded to HF.')
              print('This check will pass automatically once ONNX files are uploaded.')
              exit(0)

          print('Downloading slot1 ONNX...')
          try:
              hf_hub_download(
                  repo_id=REPO,
                  filename='deployment/slot1_v2l_seed2024.onnx.data',
                  token=token
              )
              onnx_path = hf_hub_download(
                  repo_id=REPO,
                  filename=onnx_file,
                  token=token
              )
          except EntryNotFoundError as e:
              print(f'SKIP: {e}')
              exit(0)

          sess = ort.InferenceSession(onnx_path, providers=['CPUExecutionProvider'])
          inp  = np.random.randn(1, 1, 512, 512).astype(np.float32)
          out  = sess.run(None, {sess.get_inputs()[0].name: inp})

          assert out[0].shape == (1, 4, 512, 512), f'Bad output shape: {out[0].shape}'
          assert not np.any(np.isnan(out[0])), 'NaN in output!'
          print(f'slot1 OK — output shape: {out[0].shape}')
          print('All ONNX validations passed.')
          EOF

  # ── Job 2: HuggingFace Space health check ───────────────────────────────────
  space-health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check HF Space is reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://animeshakr-oct-fluid-segmentation.hf.space/" \
            --max-time 30 || echo "000")
          echo "Space HTTP status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ] || [ "$STATUS" = "000" ]; then
            echo "Space reachable or sleeping — OK"
          else
            echo "Unexpected status: $STATUS — check Space manually"
          fi

  # ── Job 3: Validate results JSON ────────────────────────────────────────────
  results-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install huggingface_hub

      - name: Validate results from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import json
          from huggingface_hub import hf_hub_download, list_repo_files
          from huggingface_hub.utils import EntryNotFoundError, RepositoryNotFoundError
          import os

          token = os.environ.get('HF_TOKEN')
          REPO  = 'animeshakr/oct-fluid-segmentation'

          try:
              repo_files = list(list_repo_files(repo_id=REPO, token=token))
          except RepositoryNotFoundError:
              print('SKIP: HF repo not found.')
              exit(0)

          # ── Check demo_results.json ──────────────────────────────────────────
          if 'demo_results.json' not in repo_files:
              print('SKIP: demo_results.json not yet uploaded.')
              print('This check will pass automatically once files are uploaded.')
              exit(0)

          print('Downloading demo_results.json...')
          path = hf_hub_download(repo_id=REPO, filename='demo_results.json', token=token)

          with open(path) as f:
              data = json.load(f)

          assert 'samples'  in data, 'Missing samples key'
          assert 'metadata' in data, 'Missing metadata key'
          assert len(data['samples']) > 0, 'No samples found'

          s = data['samples'][0]
          for field in ['id', 'source', 'oct_image', 'fluid_volumes_mm3']:
              assert field in s, f'Missing field: {field}'

          print(f'demo_results.json OK — {len(data["samples"])} samples')

          # ── Check V2L_best.json if present ──────────────────────────────────
          if 'results/V2L_best.json' not in repo_files:
              print('SKIP: results/V2L_best.json not yet uploaded — skipping Dice check.')
              print('All available results validations passed.')
              exit(0)

          path2 = hf_hub_download(repo_id=REPO, filename='results/V2L_best.json', token=token)
          with open(path2) as f:
              best = json.load(f)
          dice = best.get('val_dice_mean_fluid', 0)
          assert dice > 0.70, f'V2L best dice too low: {dice}'
          print(f'V2L best val_dice_mean_fluid: {dice:.4f} (threshold > 0.70 passed)')
          print('All results validations passed.')
          EOF
