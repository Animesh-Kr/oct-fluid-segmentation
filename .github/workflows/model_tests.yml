name: Segmentation Model Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  # ── Job 1: Validate ONNX models load correctly ──────────────────────────────
  onnx-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install onnxruntime huggingface_hub numpy

      - name: Validate ONNX models from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import onnxruntime as ort
          import numpy as np
          from huggingface_hub import hf_hub_download
          import os

          token = os.environ.get('HF_TOKEN')
          REPO = 'animeshakr/oct-fluid-segmentation'

          print('Downloading slot1 ONNX...')
          # Download .onnx.data first (external data)
          hf_hub_download(repo_id=REPO, filename='deployment/slot1_v2l_seed2024.onnx.data', token=token)
          onnx_path = hf_hub_download(repo_id=REPO, filename='deployment/slot1_v2l_seed2024.onnx', token=token)

          sess = ort.InferenceSession(onnx_path, providers=['CPUExecutionProvider'])
          inp  = np.random.randn(1, 1, 512, 512).astype(np.float32)
          out  = sess.run(None, {sess.get_inputs()[0].name: inp})

          assert out[0].shape == (1, 4, 512, 512), f'Bad output shape: {out[0].shape}'
          assert not np.any(np.isnan(out[0])),      'NaN in output!'
          print(f'slot1 OK — output shape: {out[0].shape}')

          print('All ONNX validations passed.')
          EOF

  # ── Job 2: HuggingFace Space health check ───────────────────────────────────
  space-health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check HF Space is running
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://animeshakr-oct-fluid-segmentation.hf.space/" \
            --max-time 30)
          echo "Space HTTP status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
            echo "Space reachable (503 = sleeping, expected)"
          else
            echo "Unexpected status: $STATUS"
          fi

  # ── Job 3: Validate results JSON and CSV files ──────────────────────────────
  results-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install huggingface_hub

      - name: Validate demo_results.json from HuggingFace
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          python - <<'EOF'
          import json
          from huggingface_hub import hf_hub_download
          import os

          token = os.environ.get('HF_TOKEN')
          REPO  = 'animeshakr/oct-fluid-segmentation'

          print('Downloading demo_results.json...')
          path = hf_hub_download(repo_id=REPO, filename='demo_results.json', token=token)

          with open(path) as f:
              data = json.load(f)

          # Basic schema checks
          assert 'samples' in data,      'Missing samples key'
          assert 'metadata' in data,     'Missing metadata key'
          assert len(data['samples']) > 0, 'No samples found'

          # Check first sample has required fields
          s = data['samples'][0]
          for field in ['id', 'source', 'oct_image', 'fluid_volumes_mm3']:
              assert field in s, f'Missing field: {field}'

          # Check main_results CSV exists
          if 'main_results' in data and data['main_results']:
              print('main_results CSV present')

          print(f'demo_results.json OK — {len(data["samples"])} samples')

          # Dice threshold check
          path2 = hf_hub_download(repo_id=REPO, filename='results/V2L_best.json', token=token)
          with open(path2) as f:
              best = json.load(f)
          dice = best.get('val_dice_mean_fluid', 0)
          assert dice > 0.70, f'V2L best dice too low: {dice}'
          print(f'V2L best val_dice_mean_fluid: {dice:.4f} (> 0.70 threshold passed)')

          print('All results validations passed.')
          EOF
