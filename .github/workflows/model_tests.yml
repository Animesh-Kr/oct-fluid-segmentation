name: Segmentation Model Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:

  # ── Job 1: Validate ONNX models load correctly ──────────────────────────────
  onnx-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install onnxruntime huggingface_hub numpy

      - name: Validate ONNX models from HuggingFace
        run: |
          python - <<'EOF'
          import onnxruntime as ort
          import numpy as np
          from huggingface_hub import hf_hub_download

          REPO = 'animeshakr/oct-fluid-segmentation'
          DIR  = '/tmp/onnx_models'

          print('Downloading slot1 ONNX data file...')
          hf_hub_download(
              repo_id=REPO,
              filename='deployment/slot1_v2l_seed2024.onnx.data',
              local_dir=DIR,
          )
          print('Downloading slot1 ONNX model file...')
          hf_hub_download(
              repo_id=REPO,
              filename='deployment/slot1_v2l_seed2024.onnx',
              local_dir=DIR,
          )

          onnx_path = f'{DIR}/deployment/slot1_v2l_seed2024.onnx'
          print(f'Loading ONNX session from {onnx_path}...')

          sess = ort.InferenceSession(onnx_path, providers=['CPUExecutionProvider'])
          inp  = np.random.randn(1, 1, 512, 512).astype(np.float32)
          out  = sess.run(None, {sess.get_inputs()[0].name: inp})

          assert out[0].shape == (1, 4, 512, 512), f'Bad output shape: {out[0].shape}'
          assert not np.any(np.isnan(out[0])), 'NaN in output!'
          print(f'slot1 OK — output shape: {out[0].shape}')
          print('All ONNX validations passed.')
          EOF

  # ── Job 2: HuggingFace Space health check ───────────────────────────────────
  space-health-check:
    runs-on: ubuntu-latest
    steps:
      - name: Check HF Space is reachable
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://animeshakr-oct-fluid-segmentation.hf.space/" \
            --max-time 30)
          echo "Space HTTP status: $STATUS"
          if [ "$STATUS" = "200" ] || [ "$STATUS" = "503" ]; then
            echo "Space reachable — 503 means sleeping on free tier, expected"
          else
            echo "Warning: unexpected status $STATUS — space may be rebuilding"
          fi

  # ── Job 3: Validate demo_results.json ───────────────────────────────────────
  results-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install huggingface_hub

      - name: Validate demo_results.json from HuggingFace
        run: |
          python - <<'EOF'
          import json
          from huggingface_hub import hf_hub_download

          REPO = 'animeshakr/oct-fluid-segmentation'

          print('Downloading demo_results.json...')
          path = hf_hub_download(repo_id=REPO, filename='demo_results.json')

          with open(path) as f:
              data = json.load(f)

          assert 'samples'  in data, 'Missing samples key'
          assert 'metadata' in data, 'Missing metadata key'
          assert len(data['samples']) > 0, 'No samples found'

          s = data['samples'][0]
          for field in ['id', 'source', 'oct_image', 'fluid_volumes_mm3']:
              assert field in s, f'Missing field: {field}'

          print(f'demo_results.json OK — {len(data["samples"])} samples')

          dice_values = [
              s.get('dice', {}).get('mean_fluid')
              for s in data['samples']
              if s.get('dice', {}).get('mean_fluid') is not None
          ]
          if dice_values:
              avg = sum(dice_values) / len(dice_values)
              print(f'Average sample dice: {avg:.4f}')

          if data.get('main_results'):
              print('main_results CSV present')

          print('All results validations passed.')
          EOF
